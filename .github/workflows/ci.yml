name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install API deps
        run: npm install --prefix apps/api

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix apps/api

      - name: Run API tests
        run: npm test --prefix apps/api

  test-client:
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client deps
        run: npm install --prefix apps/client

      - name: Run client type check
        run: npm run build --prefix apps/client
